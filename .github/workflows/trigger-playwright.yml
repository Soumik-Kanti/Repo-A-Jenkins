name: Trigger Denowatt Playwright Tests

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  trigger-playwright:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Repo B Playwright workflow
        env:
          GH_TOKEN: ${{ secrets.REPO_B_TOKEN }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Soumik-Kanti/denowatt-playwright/dispatches \
            -d "{\"event_type\":\"run-playwright-tests\",\"client_payload\":{\"source_repo\":\"$SOURCE_REPO\",\"sha\":\"$SOURCE_SHA\"}}"